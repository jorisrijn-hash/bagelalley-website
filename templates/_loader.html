{# Paginalaad-animatie - herbruikbaar, valt vanzelf weg (CSS-failsafe + JS) #}
<div id="ba-loader" aria-hidden="true">
  <div class="ba-loader-inner">
    <svg class="ba-bagel" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
      <circle cx="50" cy="50" r="30" fill="none" stroke="#d4a056" stroke-width="18"/>
      <circle cx="50" cy="50" r="39" fill="none" stroke="#b9863f" stroke-width="1.4" opacity=".55"/>
      <circle cx="50" cy="50" r="21" fill="none" stroke="#b9863f" stroke-width="1.4" opacity=".55"/>
      <g fill="#f4e6c8">
        <ellipse cx="80"   cy="50"   rx="2.1" ry="3.6"/>
        <ellipse cx="74.3" cy="67.6" rx="2.1" ry="3.6"/>
        <ellipse cx="59.3" cy="78.5" rx="2.1" ry="3.6"/>
        <ellipse cx="40.7" cy="78.5" rx="2.1" ry="3.6"/>
        <ellipse cx="25.7" cy="67.6" rx="2.1" ry="3.6"/>
        <ellipse cx="20"   cy="50"   rx="2.1" ry="3.6"/>
        <ellipse cx="25.7" cy="32.4" rx="2.1" ry="3.6"/>
        <ellipse cx="40.7" cy="21.5" rx="2.1" ry="3.6"/>
        <ellipse cx="59.3" cy="21.5" rx="2.1" ry="3.6"/>
        <ellipse cx="74.3" cy="32.4" rx="2.1" ry="3.6"/>
      </g>
    </svg>
    <div class="ba-loader-word">Bagel <span>Alley</span></div>
  </div>
</div>
<style>
  #ba-loader { position: fixed; inset: 0; z-index: 9999; display: flex; align-items: center; justify-content: center;
    background: #F5F0E8; animation: baLoaderOut .6s ease 1.2s forwards; }
  .ba-loader-inner { text-align: center; }
  .ba-bagel { width: 66px; height: 66px; transform-origin: 50% 50%; animation: baSpin 1.1s linear infinite; }
  .ba-loader-word { margin-top: 18px; font-family: 'Playfair Display', Georgia, serif; font-size: 1.45rem;
    color: #2a2230; letter-spacing: .01em; opacity: 0; animation: baWordIn .55s ease .15s forwards; }
  .ba-loader-word span { color: #8758CE; font-style: italic; }
  #ba-loader.ba-hide { opacity: 0; visibility: hidden; transition: opacity .5s ease; }
  @keyframes baSpin { to { transform: rotate(360deg); } }
  @keyframes baWordIn { to { opacity: 1; } }
  @keyframes baLoaderOut { to { opacity: 0; visibility: hidden; } }
  @media (prefers-reduced-motion: reduce) {
    .ba-bagel { animation: none; }
    .ba-loader-word { animation: none; opacity: 1; }
    #ba-loader { animation: baLoaderOut .4s ease .3s forwards; }
  }
</style>
<script>
  (function () {
    var l = document.getElementById('ba-loader');
    if (!l) return;
    function hide() {
      l.classList.add('ba-hide');
      setTimeout(function () { if (l && l.parentNode) l.parentNode.removeChild(l); }, 600);
    }
    window.addEventListener('load', function () { setTimeout(hide, 300); });
    setTimeout(hide, 2500); // failsafe
  })();
</script>
