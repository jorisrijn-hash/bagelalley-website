{# Paginalaad-animatie - huisstijl, logo met draaiende ring. Valt vanzelf weg. #}
<div id="ba-loader" aria-hidden="true">
  <div class="ba-loader-inner">
    <div class="ba-logo-orbit">
      <svg class="ba-ring" viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg">
        <circle cx="60" cy="60" r="55" fill="none" stroke="rgba(135,88,206,.16)" stroke-width="2"/>
        <circle cx="60" cy="60" r="55" fill="none" stroke="#9B6EE0" stroke-width="2.5"
                stroke-linecap="round" stroke-dasharray="62 280"/>
      </svg>
      <img class="ba-logo" src="{{ url_for('static', filename='favicon/android-chrome-192x192.png') }}" alt="Bagel Alley">
    </div>
    <div class="ba-loader-word">Bagel <span>Alley</span></div>
  </div>
</div>
<style>
  #ba-loader { position: fixed; inset: 0; z-index: 9999; display: flex; align-items: center; justify-content: center;
    background: radial-gradient(circle at 50% 42%, #271b30 0%, #1A1018 62%);
    animation: baLoaderOut .6s ease 1.35s forwards; }
  .ba-loader-inner { text-align: center; }
  .ba-logo-orbit { position: relative; width: 120px; height: 120px; margin: 0 auto; }
  .ba-ring { position: absolute; inset: 0; width: 120px; height: 120px; transform-origin: 50% 50%;
    animation: baSpin 1.2s linear infinite; }
  .ba-logo { position: absolute; top: 50%; left: 50%; width: 72px; height: 72px;
    transform: translate(-50%, -50%); filter: drop-shadow(0 0 16px rgba(135,88,206,.55));
    animation: baPulse 1.7s ease-in-out infinite; }
  .ba-loader-word { margin-top: 22px; font-family: 'Playfair Display', Georgia, serif; font-size: 1.5rem;
    color: #F5F0E8; letter-spacing: .01em; opacity: 0; animation: baWordIn .6s ease .2s forwards; }
  .ba-loader-word span { color: #9B6EE0; font-style: italic; }
  #ba-loader.ba-hide { opacity: 0; visibility: hidden; transition: opacity .5s ease; }
  @keyframes baSpin { to { transform: rotate(360deg); } }
  @keyframes baPulse { 0%, 100% { transform: translate(-50%,-50%) scale(1); } 50% { transform: translate(-50%,-50%) scale(1.06); } }
  @keyframes baWordIn { to { opacity: 1; } }
  @keyframes baLoaderOut { to { opacity: 0; visibility: hidden; } }
  @media (prefers-reduced-motion: reduce) {
    .ba-ring, .ba-logo { animation: none; }
    .ba-loader-word { animation: none; opacity: 1; }
    #ba-loader { animation: baLoaderOut .4s ease .3s forwards; }
  }
</style>
<script>
  (function () {
    var l = document.getElementById('ba-loader');
    if (!l) return;
    function hide() {
      l.classList.add('ba-hide');
      setTimeout(function () { if (l && l.parentNode) l.parentNode.removeChild(l); }, 600);
    }
    window.addEventListener('load', function () { setTimeout(hide, 300); });
    setTimeout(hide, 2500); // failsafe
  })();
</script>
